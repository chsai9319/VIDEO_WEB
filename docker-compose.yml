version: "3.9"

services:
  myvault:
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    container_name: myvault
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      # Persist uploaded videos on the host
      - myvault_uploads:/app/uploads
    environment:
      PORT: "5000"
      UPLOAD_FOLDER: "/app/uploads"
      MAX_CONTENT_MB: "2048"      # Max upload size per file in MB (2 GB default)
      FLASK_DEBUG: "false"
      WORKERS: "2"                # Gunicorn worker count
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  myvault_uploads:
    driver: local
